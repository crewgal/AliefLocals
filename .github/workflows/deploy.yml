name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-alieflocals-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: /home/devmarvsftp/domains/alieflocals.com/prod

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify frontend build
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Trust VPS host key
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Create deploy directories
        run: |
          test -n "${APP_DIR}"
          ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
            "mkdir -p '${APP_DIR}' '${APP_DIR}/runtime/api-logs' '${APP_DIR}/runtime/api-cache' '${APP_DIR}/uploads'"

      - name: Sync application to VPS
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude "dist/" \
            --exclude "dist-ssr/" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "runtime/" \
            --exclude "uploads/" \
            --exclude "coverage/" \
            --exclude "reports/" \
            --exclude "playwright-report/" \
            --exclude "test-results/" \
            -e "ssh -p ${{ secrets.DEPLOY_SSH_PORT }}" \
            ./ \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:${APP_DIR}/"

      - name: Rebuild and restart Docker stack
        run: |
          test -n "${APP_DIR}"
          ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" <<EOF
          set -eu
          cd "${APP_DIR}"

          if [ ! -f .env.docker ]; then
            echo ".env.docker is missing in ${APP_DIR}"
            exit 1
          fi

          DB_NETWORK_NAME="\$(grep '^DB_NETWORK_NAME=' .env.docker | tail -1 | cut -d '=' -f 2-)"
          DB_NETWORK_NAME="\${DB_NETWORK_NAME:-bamlead-vps-db_bamlead-network}"

          docker network inspect "\${DB_NETWORK_NAME}" >/dev/null 2>&1 || {
            echo "Docker network \${DB_NETWORK_NAME} does not exist on the VPS."
            exit 1
          }

          docker compose --env-file .env.docker config >/dev/null
          docker compose --env-file .env.docker build --pull app
          echo "Running database migration..."
          docker compose --env-file .env.docker run --rm --no-deps app php /app/scripts/migrate.php
          docker compose --env-file .env.docker up -d --remove-orphans
          docker compose --env-file .env.docker ps
          EOF
