services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: alieflocals-app:frankenphp
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.docker}
    ports:
      - "${APP_HTTP_PORT:-8080}:80"
    volumes:
      - ./runtime/api-logs:/app/api/logs
      - ./runtime/api-cache:/app/api/cache
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/api/health | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app
      - db

networks:
  app:
  db:
    external: true
    name: ${DB_NETWORK_NAME:-mysql_bamlead-network}
